name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: aperture-router
            asset_name: aperture-router-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            artifact_name: aperture-router
            asset_name: aperture-router-aarch64-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          strip target/${{ matrix.target }}/release/aperture-router || true

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset_name }}.tar.gz aperture-router
          cd ../../..

      - name: Generate checksums
        run: |
          sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## Aperture Router ${{ steps.version.outputs.VERSION }}

            ### Installation

            #### Linux (x86_64)
            ```bash
            wget https://github.com/Wayazi/aperture-router/releases/download/${{ steps.version.outputs.VERSION }}/aperture-router-x86_64-linux.tar.gz
            tar xzf aperture-router-x86_64-linux.tar.gz
            sudo cp aperture-router /usr/local/bin/
            ```

            #### Linux (aarch64)
            ```bash
            wget https://github.com/Wayazi/aperture-router/releases/download/${{ steps.version.outputs.VERSION }}/aperture-router-aarch64-linux.tar.gz
            tar xzf aperture-router-aarch64-linux.tar.gz
            sudo cp aperture-router /usr/local/bin/
            ```

            #### Cargo
            ```bash
            cargo install aperture-router
            ```

            #### AUR (Arch Linux)
            ```bash
            yay -S aperture-router
            ```

            ### Verification

            Verify the download with SHA256:
            ```bash
            sha256sum -c aperture-router-*-linux.sha256
            ```

            ### What's Changed

            See [CHANGELOG.md](https://github.com/Wayazi/aperture-router/blob/main/CHANGELOG.md) for details.

          files: |
            artifacts/*/*.tar.gz
            artifacts/*/*.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
